version: "2"
run:
    timeout: 5m
    go: 1.26.0
    build-tags:
        - goexperiment.arenas
        - goexperiment.goroutineleakprofile
        - goexperiment.jsonv2
        - goexperiment.runtimesecret
        - goexperiment.simd
    allow-parallel-runners: true
    allow-serial-runners: true
    issues-exit-code: 1
    tests: true
output:
    formats: {}
# Disable depguard for now - configuration is complex and package naming causes issues
linters:
    disable:
        - depguard
        - testpackage
linters-settings:
    depguard:
        packages-to-ignore:
            - github.com/LarsArtmann/gogenfilter
            - github.com/go-faster/yaml
formatters:
    enable:
        - gci
        - goimports
        - gofumpt
        - golines
issues:
    max-issues-per-linter: 50
    max-same-issues: 10
