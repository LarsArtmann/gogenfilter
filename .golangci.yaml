version: "2"
run:
  timeout: 5m
  go: 1.26.4
  build-tags:
    - goexperiment.arenas
    - goexperiment.goroutineleakprofile
    - goexperiment.jsonv2
    - goexperiment.runtimesecret
    - goexperiment.simd
  allow-parallel-runners: true
  allow-serial-runners: true
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    - noinlineerr
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
    - zerologlint
  settings:
    cyclop:
      max-complexity: 12
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/bmatcuk/doublestar/v4
            - github.com/go-faster/yaml
            - github.com/LarsArtmann/gogenfilter
            - github.com/onsi/ginkgo/v2
            - github.com/onsi/gomega
    exhaustruct:
      exclude:
        - .*/fstest\.MapFile
    ginkgolinter:
      forbid-focus-container: true
      forbid-spec-pollution: true
    gocritic:
      disabled-checks:
        - ifElseChain
    gomoddirectives:
      replace-local: true
    ireturn:
      allow:
        - error
        - empty
        - anon
        - stdlib
        - generic
    makezero:
      always: true
    revive:
      rules:
        - disabled: true
          name: exported
        - disabled: true
          name: package-comments
    testifylint:
      disable:
        - go-require
      enable-all: true
    varnamelen:
      ignore-map-index-ok: true
      ignore-names:
        - err
        - ok
        - tt
        - fn
        - t
        - i
        - m
        - g
        - a
        - b
        - v
      ignore-type-assert-ok: true
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - cyclop
          - funlen
          - gocognit
          - revive
          - testpackage
      - path: _test\.go
        text: unused
        linters:
          - unused
    paths:
      - \.gen\.go$
      - \.pb\.go$
      - _enum\.go$
      - _mock\.go$
      - _moq\.go$
      - _string\.go$
      - _templ\.go$
      - testdata/counterfeiter/
      - testdata/easyjson/
      - testdata/ent/
      - testdata/go-swagger/
      - testdata/gqlgen/
      - testdata/mockery/
      - testdata/msgp/
      - testdata/sqlc/
      - vendor/
      - wire_gen\.go$
      - zz_generated\..*\.go$
formatters:
  enable:
    - gci
    - goimports
    - gofumpt
    - golines
    - swaggo
  settings:
    golines:
      max-len: 120
  exclusions:
    generated: lax
    paths:
      - \.gen\.go$
      - \.pb\.go$
      - _enum\.go$
      - _mock\.go$
      - _moq\.go$
      - _string\.go$
      - _templ\.go$
      - testdata/counterfeiter/
      - testdata/easyjson/
      - testdata/ent/
      - testdata/go-swagger/
      - testdata/gqlgen/
      - testdata/mockery/
      - testdata/msgp/
      - testdata/sqlc/
      - wire_gen\.go$
      - zz_generated\..*\.go$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
