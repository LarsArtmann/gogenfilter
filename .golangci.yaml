version: "2"
run:
    timeout: 5m
    go: 1.26.1
    build-tags:
        - goexperiment.goroutineleakprofile
        - goexperiment.jsonv2
        - goexperiment.simd
    allow-parallel-runners: true
    allow-serial-runners: true
    issues-exit-code: 1
    tests: true
output:
    formats: {}
linters:
    enable:
        - arangolint
        - asasalint
        - asciicheck
        - bidichk
        - bodyclose
        - canonicalheader
        - containedctx
        - contextcheck
        - copyloopvar
        - cyclop
        - decorder
        - dogsled
        - dupl
        - dupword
        - durationcheck
        - embeddedstructfieldcheck
        - err113
        - errcheck
        - errchkjson
        - errname
        - errorlint
        - exhaustive
        - exhaustruct
        - exptostd
        - fatcontext
        - forbidigo
        - forcetypeassert
        - ginkgolinter
        - gocheckcompilerdirectives
        - gochecknoinits
        - gochecksumtype
        - gocognit
        - goconst
        - gocritic
        - gocyclo
        - godoclint
        - godot
        - godox
        - goheader
        - gomoddirectives
        - gomodguard
        - goprintffuncname
        - gosmopolitan
        - govet
        - grouper
        - iface
        - importas
        - inamedparam
        - ineffassign
        - interfacebloat
        - intrange
        - iotamixing
        - ireturn
        - loggercheck
        - maintidx
        - makezero
        - mirror
        - misspell
        - mnd
        - modernize
        - musttag
        - nakedret
        - nestif
        - nilerr
        - nilnesserr
        - nilnil
        - nlreturn
        - noctx
        - nolintlint
        - nonamedreturns
        - nosprintfhostport
        - perfsprint
        - prealloc
        - predeclared
        - promlinter
        - protogetter
        - reassign
        - recvcheck
        - rowserrcheck
        - sloglint
        - spancheck
        - sqlclosecheck
        - staticcheck
        - tagalign
        - tagliatelle
        - testableexamples
        - testifylint
        - thelper
        - unconvert
        - unparam
        - unqueryvet
        - unused
        - usestdlibvars
        - usetesting
        - wastedassign
        - whitespace
        - wrapcheck
        - wsl_v5
        - zerologlint
formatters:
    enable:
        - gci
        - goimports
        - gofumpt
        - golines
issues:
    max-issues-per-linter: 50
    max-same-issues: 10
    exclude-rules:
        - path: _test\.go
          linters:
            - exhaustruct

linters-settings:
    depguard:
        rules:
            Main:
                allow:
                    - $gostd
                    - $gopkg
                    - golang.org
                    - github.com/LarsArtmann/gogenfilter/pkg/errors
                    - github.com/go-faster/yaml
    exhaustruct:
        allow-empty-returns: true
        allow-empty-declarations: true
