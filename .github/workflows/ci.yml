name: CI

on:
  push:
    branches: [master]
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - testdata/**
      - .golangci.yml
      - .golangci.yaml
      - .github/workflows/ci.yml
  pull_request:
    branches: [master]
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - testdata/**
      - .golangci.yml
      - .golangci.yaml
      - .github/workflows/ci.yml

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - run: go mod download

      - run: go mod verify

      - run: go build ./...

      - run: go vet ./...

      - run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 98" | bc -l)" -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below 98% threshold"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
