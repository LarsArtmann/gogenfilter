name: CI

on:
  push:
    branches: [master]
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - testdata/**
      - .golangci.yml
      - .golangci.yaml
      - .github/workflows/ci.yml
      - README.md
      - doc.go
      - website/**
  pull_request:
    branches: [master]
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - testdata/**
      - .golangci.yml
      - .golangci.yaml
      - .github/workflows/ci.yml
      - README.md
      - doc.go
      - website/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOEXPERIMENT: jsonv2

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - run: go mod download

      - run: go mod verify

      - run: go build ./...

      - run: go vet ./...

      - run: go test -race ./... # all packages compile and pass

      - run: go test -race -coverprofile=coverage.out .

      - name: Coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 98" | bc -l)" -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below 98% threshold"
            exit 1
          fi

  vulncheck:
    name: Vulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - run: govulncheck ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  dedup:
    name: Code Duplication
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - run: go install github.com/LarsArtmann/art-dupl/cmd/art-dupl@latest

      - name: Check for code duplication
        run: |
          art-dupl --semantic -t 15 \
            --exclude-pattern 'testdata/moq/**' \
            --exclude-pattern 'sqlc.go'

  docs:
    name: Generated Docs Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Regenerate docs from Go source
        run: go generate ./...

      - name: Check for stale generated docs
        run: |
          if ! git diff --exit-code -- README.md doc.go website/src/data/generators.json website/src/content/docs/generators.mdx website/src/content/docs/api/detection.mdx; then
            echo "::error::Generated docs are stale. Run 'go generate ./...' and commit the changes."
            git diff --stat
            exit 1
          fi
