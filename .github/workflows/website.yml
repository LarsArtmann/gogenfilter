name: Website

on:
  push:
    branches: [master]
    paths:
      - website/**
      - .github/workflows/website.yml
      - .github/workflows/lighthouse.yml
      - lighthouserc.json
  pull_request:
    branches: [master]
    paths:
      - website/**
      - .github/workflows/website.yml
      - .github/workflows/lighthouse.yml
      - lighthouserc.json
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-website:
    name: Build Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v6

      - name: Checkout md-go-validator
        continue-on-error: true
        id: checkout-md-go-validator
        uses: actions/checkout@v6
        with:
          repository: LarsArtmann/md-go-validator
          path: md-go-validator
          token: ${{ secrets.PRIVATE_REPO_TOKEN || github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - run: npm ci
        working-directory: website

      - run: npx astro check
        working-directory: website

      - run: npm run build
        working-directory: website

      - name: Build md-go-validator from source
        if: steps.checkout-md-go-validator.outcome == 'success'
        id: build-md-go-validator
        working-directory: md-go-validator
        run: go build -o ../md-go-validator-bin ./cmd/md-go-validator

      - name: Validate documentation code blocks
        if: steps.build-md-go-validator.outcome == 'success'
        continue-on-error: true
        run: ../md-go-validator-bin -f json -o validation-results.json src/content/docs/

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: doc-validation-results
          path: website/validation-results.json
          if-no-files-found: ignore

      - name: HTML Validation
        run: npx html-validate --config .htmlvalidate.json "dist/**/*.html"
        working-directory: website

      - name: Code duplication check
        run: npm run dedup
        working-directory: website

      - uses: actions/upload-artifact@v7
        with:
          name: website-dist
          path: website/dist/

  deploy-website:
    name: Deploy Website
    needs: build-website
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: website-dist
          path: website/dist/

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: lars-software
          channelId: live
          target: gogenfilter
          entryPoint: website
