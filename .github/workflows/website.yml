name: Website

on:
  push:
    branches: [master]
    paths:
      - website/**
      - .github/workflows/website.yml
  pull_request:
    branches: [master]
    paths:
      - website/**
      - .github/workflows/website.yml

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  build-website:
    name: Build Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - run: npm install

      - run: npm run build

      - name: Install md-go-validator
        run: go install github.com/larsartmann/md-go-validator@latest

      - name: Validate documentation code blocks
        run: md-go-validator -f json -o validation-results.json src/content/docs/docs/

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doc-validation-results
          path: website/validation-results.json
          if-no-files-found: ignore

      - name: HTML Validation
        run: npx html-validate --config .htmlvalidate.json dist/**/*.html || true

      - uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist/

  deploy-website:
    name: Deploy Website
    needs: build-website
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website/dist/

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: lars-software
          channelId: live
          target: gogenfilter
          entryPoint: website
