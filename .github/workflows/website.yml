name: Website

on:
  push:
    branches: [master]
    paths:
      - website/**
      - .github/workflows/website.yml
      - .github/workflows/lighthouse.yml
      - lighthouserc.json
      - flake.nix
      - flake.lock
  pull_request:
    branches: [master]
    paths:
      - website/**
      - .github/workflows/website.yml
      - .github/workflows/lighthouse.yml
      - lighthouserc.json
      - flake.nix
      - flake.lock
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-website:
    name: Build Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: npm install
        working-directory: website

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev
        working-directory: website
        continue-on-error: true

      - run: npx astro check
        working-directory: website

      - run: npm run build
        working-directory: website

      - name: Validate documentation code blocks
        run: nix run .#validate-docs
        working-directory: website

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: doc-validation-results
          path: website/validation-results.json
          if-no-files-found: ignore

      - name: HTML Validation
        run: npx html-validate --config .htmlvalidate.json "dist/**/*.html"
        working-directory: website

      - name: Code duplication check
        run: npm run dedup
        working-directory: website

      - name: Validate import paths contain /v3
        run: |
          ERRORS=""
          # Check that all import paths in docs and website source reference /v3
          for file in $(grep -rl 'github.com/LarsArtmann/gogenfilter' --include='*.md' --include='*.mdx' --include='*.ts' --include='*.astro' README.md website/src/ website/src/content/); do
            # Skip go.mod and go.sum
            if grep -q 'github.com/LarsArtmann/gogenfilter/v3' "$file"; then
              continue
            fi
            # Flag files that reference the module without /v3
            BAD=$(grep -n 'github.com/LarsArtmann/gogenfilter"[^/]' "$file" 2>/dev/null || true)
            if [ -n "$BAD" ]; then
              ERRORS="$ERRORS\n$file:\n$BAD\n"
            fi
          done
          if [ -n "$ERRORS" ]; then
            echo "::error::Import paths missing /v3 found:$ERRORS"
            exit 1
          fi
          echo "All import paths correctly reference /v3"

      - name: Check for stale references to deleted files
        run: |
          DELETED_FILES="metrics.go phantom.go errorCodeDefs"
          ERRORS=""
          for deleted in $DELETED_FILES; do
            REFS=$(grep -rl "$deleted" --include='*.md' --include='*.mdx' --include='*.go' \
              README.md CONTRIBUTING.md FEATURES.md DOMAIN_LANGUAGE.md \
              website/src/content/docs/getting-started/ \
              website/src/content/docs/guides/ \
              website/src/content/docs/contributing.mdx \
              2>/dev/null || true)
            if [ -n "$REFS" ]; then
              ERRORS="$ERRORS\nReferences to deleted file '$deleted' found in:\n$REFS\n"
            fi
          done
          if [ -n "$ERRORS" ]; then
            echo "::error::Stale references to deleted files:$ERRORS"
            exit 1
          fi
          echo "No stale references to deleted files"

      - name: Verify CHANGELOG sync
        run: |
          # Extract version headers from root CHANGELOG.md
          ROOT_VERSIONS=$(grep -oP '^## \K\[v[\d.]+\]' CHANGELOG.md | sort)
          # Extract version headers from website changelog.mdx
          WEB_VERSIONS=$(grep -oP '^## \K\[v[\d.]+\]' website/src/content/docs/changelog.mdx | sort)
          if [ "$ROOT_VERSIONS" != "$WEB_VERSIONS" ]; then
            echo "::error::CHANGELOG.md and changelog.mdx version sections are out of sync"
            echo "Root versions: $ROOT_VERSIONS"
            echo "Web versions: $WEB_VERSIONS"
            exit 1
          fi
          echo "CHANGELOG versions are in sync"

      - uses: actions/upload-artifact@v7
        with:
          name: website-dist
          path: website/dist/

  deploy-website:
    name: Deploy Website
    needs: build-website
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: actions/download-artifact@v8
        with:
          name: website-dist
          path: website/dist/

      - name: Deploy to Firebase Hosting
        working-directory: website
        run: |
          npm install -g firebase-tools
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > "$RUNNER_TEMP/gcp-key.json"
          firebase deploy --only hosting:gogenfilter --project lars-software
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json
