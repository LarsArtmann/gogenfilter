name: Website

on:
  push:
    branches: [master]
    paths:
      - website/**
      - .github/workflows/website.yml
  pull_request:
    branches: [master]
    paths:
      - website/**
      - .github/workflows/website.yml

permissions:
  contents: read

concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-website:
    name: Build Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        path: md-go-validator
        with:
          repository: LarsArtmann/md-go-validator

      - uses: actions/checkout@v4
        path: go-output
        with:
          repository: LarsArtmann/go-output

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - run: npm ci
        working-directory: website

      - run: npx astro check
        working-directory: website

      - run: npm run build
        working-directory: website

      - name: Build md-go-validator from source
        run: |
          cd md-go-validator && go build -o ../md-go-validator-bin ./cmd/md-go-validator

      - name: Validate documentation code blocks
        continue-on-error: true
        run: ./md-go-validator-bin -f json -o website/validation-results.json website/src/content/docs/

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doc-validation-results
          path: website/validation-results.json
          if-no-files-found: ignore

      - name: HTML Validation
        run: npx html-validate --config .htmlvalidate.json "dist/**/*.html"
        working-directory: website

      - uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist/

  deploy-website:
    name: Deploy Website
    needs: build-website
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website/dist/

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: lars-software
          channelId: live
          target: gogenfilter
          entryPoint: website
