version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: deps(go)
    labels:
      - dependencies
      - go

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: deps(npm)
    labels:
      - dependencies
      - website

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - ci
